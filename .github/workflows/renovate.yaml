name: Renovate

on:
  workflow_dispatch:
  # Daily at midnight Eastern Time (5 AM UTC = midnight EST / 1 AM EDT)
  schedule:
    - cron: '0 5 * * *'

jobs:
  renovate:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Renovate
        uses: renovatebot/github-action@v46.1.5
        with:
          token: ${{ github.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
