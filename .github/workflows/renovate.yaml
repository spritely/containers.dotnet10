name: Renovate

on:
  workflow_dispatch:
  push:

jobs:
  renovate:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Renovate
        uses: renovatebot/github-action@v40.3.11
        with:
          token: ${{ github.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
