name: Renovate

on:
  workflow_dispatch:
  push:

jobs:
  renovate:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
      security-events: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Renovate
        uses: renovatebot/github-action@v46.1.5
        with:
          token: ${{ github.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
