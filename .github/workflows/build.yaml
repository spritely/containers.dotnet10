name: Build and Publish Container

on: [push, workflow_dispatch]

# Permissions required for automatic semantic version tagging
permissions:
    contents: write

jobs:
  build:
    # Available runners: https://github.com/actions/runner-images
    runs-on: ubuntu-24.04

    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@9030147256b1893f621a45535878d4050b9ad168
        with:
          writeSummary: "true"

      - name: Build and test
        run: ./test.sh

      - name: Build and publish container
        uses: spritely/actions.publish-container@1b0ac0e1e43063bd9b9068af9c4e5f81c37d58a6
        with:
          registryUsername: ${{ secrets.DOCKER_HUB_USERNAME }}
          registryPassword: ${{ secrets.DOCKER_HUB_TOKEN }}
          registryHost: docker.io
          context: ./src
          dockerfile: ./src/Dockerfile
          imageNames: spritelydev/dotnet10-devcontainer
          version: ${{ steps.version.outputs.version }}
          writeSummary: "true"

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@9030147256b1893f621a45535878d4050b9ad168
        with:
          version: ${{ steps.version.outputs.version }}
