name: Build and Publish Container

on: [push, workflow_dispatch]

permissions:
    checks: write # Required for test reporting
    contents: write # Required for pushing tags

jobs:
  build:
    # Available runners: https://github.com/actions/runner-images
    runs-on: ubuntu-24.04

    steps:
      - id: version
        name: Get semantic version
        uses: spritely/actions.semantic-version/get@478e6d01fc2d2ce4c5ad4ab18b08744b3c9d0546 # v0.5.6
        with:
          writeSummary: true

      - name: Build and test
        run: ./test.sh

      - name: Generate test report
        uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637 # v2.5.0
        if: always()
        with:
          name: Test Results
          path: test-results/report.xml
          reporter: java-junit

      - name: Build and publish container
        uses: spritely/actions.publish-container@1b0ac0e1e43063bd9b9068af9c4e5f81c37d58a6 # v0.1.22
        with:
          registryUsername: ${{ secrets.DOCKER_HUB_USERNAME }}
          registryPassword: ${{ secrets.DOCKER_HUB_TOKEN }}
          registryHost: docker.io
          context: ./src
          dockerfile: ./src/Dockerfile
          imageNames: spritelydev/dotnet10-devcontainer
          version: ${{ steps.version.outputs.version }}
          writeSummary: true

      - name: Apply semantic version
        if: ${{ steps.version.outputs.branchName == github.event.repository.default_branch }}
        uses: spritely/actions.semantic-version/apply@478e6d01fc2d2ce4c5ad4ab18b08744b3c9d0546 # v0.5.6
        with:
          version: ${{ steps.version.outputs.version }}
