name: Renovate spritely/build

on:
  # Manual trigger only - for spritely/build updates to avoid circular dependency
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Renovate
        uses: renovatebot/github-action@v46.1.5
        with:
          configurationFile: .github/renovate-spritely-build.json
          token: ${{ github.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
